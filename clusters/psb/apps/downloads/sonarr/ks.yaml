---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sonarr
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: sonarr
  components:
    - ../../../../components/kopiur/backup
    - ../../../../components/zeroscaler/nas-nfs-scaler
  dependsOn:
    - name: kopiur
      namespace: system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: "./clusters/psb/apps/downloads/sonarr/app"
  postBuild:
    substitute:
      APP: sonarr
      KOPIUR_CLAIM: sonarr-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: downloads
  timeout: 5m
  wait: false
