---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: conduwuit
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: conduwuit
  interval: 1h
  path: ./clusters/psb/apps/matrix/conduwuit/app
  postBuild:
    substitute:
      APP: conduwuit
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: matrix
  timeout: 5m
  wait: false
