---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: home-assistant
  components:
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: kopiur
      namespace: system
    - name: multus-networks
      namespace: network
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: "./clusters/psb/apps/home-automation/home-assistant/app"
  postBuild:
    substitute:
      APP: home-assistant
      KOPIUR_MOVER_GID: "2000"
      KOPIUR_MOVER_UID: "2000"
      KOPIUR_CAPACITY: 20Gi
      KOPIUR_CLAIM: home-assistant
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-automation
  timeout: 5m
  wait: false
