---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: zigbee2mqtt
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: zigbee2mqtt
  components:
    - ../../../../components/kopiur/backup
    - ../../../../components/zeroscaler/zigbee-adapter
  dependsOn:
    - name: kopiur
      namespace: system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: "./clusters/psb/apps/home-automation/zigbee2mqtt/app"
  postBuild:
    substitute:
      APP: zigbee2mqtt
      KOPIUR_CLAIM: zigbee2mqtt-data
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-automation
  timeout: 5m
  wait: false
