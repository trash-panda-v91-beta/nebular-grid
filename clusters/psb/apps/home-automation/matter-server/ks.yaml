---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: matter-server
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: matter-server
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: home-assistant
      namespace: home-automation
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: "./clusters/psb/apps/home-automation/matter-server/app"
  postBuild:
    substitute:
      APP: matter-server
      VOLSYNC_CLAIM: matter-server-data
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-automation
  timeout: 5m
  wait: false
