---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-config
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-config
    creationPolicy: Owner
    template:
      data:
        LITELLM_API_KEY: '{{ index . "master key" }}'
        MEMINI_API_KEY: "{{ .api_key }}"
  dataFrom:
    - extract:
        key: litellm
    - extract:
        key: memini
