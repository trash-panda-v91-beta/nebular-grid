---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    custom_providers:
      - name: litellm
        base_url: http://litellm.ai:4000/v1
        key_env: LITELLM_API_KEY
        models:
          openai/glm-5.2:
            context_length: 1048560
          openai/deepseek-v4-pro:
            context_length: 131072
          openai/kimi-k2.6:
            context_length: 131072
          openai/kimi-k2.7-code:
            context_length: 131072
          openai/qwen3.7-max:
            context_length: 262144
    model:
      default: openai/deepseek-v4-pro
      provider: custom:litellm
      context_length: 131072
    model_aliases:
      glm:
        model: openai/glm-5.2
        provider: custom:litellm
      deepseek:
        model: openai/deepseek-v4-pro
        provider: custom:litellm
      kimi:
        model: openai/kimi-k2.6
        provider: custom:litellm
      kimi-code:
        model: openai/kimi-k2.7-code
        provider: custom:litellm
      qwen:
        model: openai/qwen3.7-max
        provider: custom:litellm
    fallback_providers:
      - provider: custom:litellm
        model: openai/glm-5.2
      - provider: custom:litellm
        model: openai/kimi-k2.6
    auxiliary:
      approval:
        provider: custom:litellm
        model: openai/deepseek-v4-pro
        timeout: 60
      compression:
        provider: custom:litellm
        model: openai/deepseek-v4-pro
      web_extract:
        provider: custom:litellm
        model: openai/deepseek-v4-pro
      session_search:
        provider: custom:litellm
        model: openai/kimi-k2.6
      vision:
        provider: custom:litellm
        model: openai/deepseek-v4-pro
      goal_judge:
        provider: custom:litellm
        model: openai/kimi-k2.6
      title_generation:
        provider: custom:litellm
        model: openai/kimi-k2.6
      profile_describer:
        provider: custom:litellm
        model: openai/kimi-k2.6
      triage_specifier:
        provider: custom:litellm
        model: openai/kimi-k2.6
      kanban_decomposer:
        provider: custom:litellm
        model: openai/kimi-k2.6
      curator:
        provider: custom:litellm
        model: openai/kimi-k2.6
        timeout: 600
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 900
      lifetime_seconds: 1800
      persistent_shell: true
    compression:
      enabled: true
      protect_last_n: 20
      threshold: 0.5
    streaming:
      enabled: false
    approvals:
      mode: smart
      timeout: 60
      cron_mode: deny
    security:
      redact_secrets: true
      website_blocklist:
        enabled: true
        domains:
          - "169.254.169.254"
          - "metadata.google.internal"
    privacy:
      redact_pii: true
    agent:
      max_turns: 150
      gateway_timeout: 1800
      gateway_timeout_warning: 900
      restart_drain_timeout: 60
      api_max_retries: 3
      reasoning_effort: medium
    delegation:
      model: openai/kimi-k2.6
      max_concurrent_children: 8
      max_spawn_depth: 2
    moa:
      default_preset: council
      presets:
        council:
          enabled: true
          reference_models:
            - provider: custom:litellm
              model: openai/deepseek-v4-pro
            - provider: custom:litellm
              model: openai/glm-5.2
            - provider: custom:litellm
              model: openai/kimi-k2.6
          aggregator:
            provider: custom:litellm
            model: openai/deepseek-v4-pro
          reference_temperature: 0.6
          aggregator_temperature: 0.4
          max_tokens: 8192
    platforms:
      matrix:
        enabled: true
    matrix:
      require_mention: false
      auto_thread: false
      dm_mention_threads: false
    display:
      platforms:
        matrix:
          tool_progress: "off"
    web:
      search_backend: searxng
    mcp_servers:
      litellm:
        url: http://litellm.ai:4000/mcp
        headers:
          Authorization: "Bearer $${LITELLM_API_KEY}"
    dashboard:
      basic_auth:
        username: admin
        password_hash: "scrypt$16384$8$1$q6oeuCXdiAvvIpLv8/CwKA==$rUrm94HL/2oGfvnV6SqsFpl5bm7CpKZu0q6Nhx3zHqs="
  env: |-
    # Secrets are injected via Kubernetes envFrom; this file only holds
    # non-secret runtime overrides.
    OPENAI_BASE_URL=http://litellm.ai:4000/v1
