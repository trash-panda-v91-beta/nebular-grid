---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    custom_providers:
      - name: litellm
        base_url: http://litellm.ai:4000/v1
        key_env: LITELLM_API_KEY
        models:
          opencode-go/minimax-m3:
            context_length: 1000000
          opencode-go/glm-5.2:
            context_length: 1048560
          opencode-go/deepseek-v4-flash:
            context_length: 131072
          opencode-go/mimo-v2.5:
            context_length: 262144
          opencode-go/qwen3.6-plus:
            context_length: 262144
    model:
      default: opencode-go/minimax-m3
      provider: custom:litellm
      context_length: 1000000
    model_aliases:
      qwen:
        model: opencode-go/qwen3.6-plus
        provider: custom:litellm
      minimax:
        model: opencode-go/minimax-m3
        provider: custom:litellm
      glm:
        model: opencode-go/glm-5.2
        provider: custom:litellm
      glm-turbo:
        model: opencode-go/deepseek-v4-flash
        provider: custom:litellm
      mimo:
        model: opencode-go/mimo-v2.5
        provider: custom:litellm
    fallback_providers:
      - provider: custom:litellm
        model: opencode-go/qwen3.6-plus
      - provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
    auxiliary:
      approval:
        provider: custom:litellm
        model: opencode-go/minimax-m3
        timeout: 60
      compression:
        provider: custom:litellm
        model: opencode-go/minimax-m3
      web_extract:
        provider: custom:litellm
        model: opencode-go/minimax-m3
      session_search:
        provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
      vision:
        provider: custom:litellm
        model: opencode-go/minimax-m3
      goal_judge:
        provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
      title_generation:
        provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
      profile_describer:
        provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
      triage_specifier:
        provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
      kanban_decomposer:
        provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
      curator:
        provider: custom:litellm
        model: opencode-go/deepseek-v4-flash
        timeout: 600
    memory:
      provider: memini
    plugins:
      enabled: []
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 900
      lifetime_seconds: 1800
      persistent_shell: true
    compression:
      enabled: true
      protect_last_n: 20
      threshold: 0.5
    streaming:
      enabled: false
    approvals:
      mode: smart
      timeout: 60
      cron_mode: deny
    security:
      redact_secrets: true
      website_blocklist:
        enabled: true
        domains:
          - "169.254.169.254"
          - "metadata.google.internal"
    privacy:
      redact_pii: true
    agent:
      max_turns: 150
      gateway_timeout: 1800
      gateway_timeout_warning: 900
      restart_drain_timeout: 60
      api_max_retries: 3
      reasoning_effort: medium
    delegation:
      model: opencode-go/deepseek-v4-flash
      max_concurrent_children: 8
      max_spawn_depth: 2
    moa:
      default_preset: council
      presets:
        council:
          enabled: true
          reference_models:
            - provider: custom:litellm
              model: opencode-go/minimax-m3
            - provider: custom:litellm
              model: opencode-go/glm-5.2
            - provider: custom:litellm
              model: opencode-go/mimo-v2.5
          aggregator:
            provider: custom:litellm
            model: opencode-go/minimax-m3
          reference_temperature: 0.6
          aggregator_temperature: 0.4
          max_tokens: 8192
    platforms:
      matrix:
        enabled: false
    matrix:
      require_mention: false
      auto_thread: false
      dm_mention_threads: false
    display:
      platforms:
        matrix:
          tool_progress: "off"
    web:
      search_backend: searxng
    dashboard:
      basic_auth:
        username: admin
        password_hash: "scrypt$16384$8$1$q6oeuCXdiAvvIpLv8/CwKA==$rUrm94HL/2oGfvnV6SqsFpl5bm7CpKZu0q6Nhx3zHqs="
  env: |-
    # Secrets are injected via Kubernetes envFrom; this file only holds
    # non-secret runtime overrides.
    OPENAI_BASE_URL=http://litellm.ai:4000/v1
