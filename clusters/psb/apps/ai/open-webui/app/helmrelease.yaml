---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 30m
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.6
            env:
              # Features
              ENABLE_LOGIN_FORM: "true"
              ENABLE_SIGNUP: "true"
              ENABLE_OLLAMA_API: "true"
              ENABLE_OPENAI_API: "true"
              OLLAMA_BASE_URL: http://ollama.ai.svc.cluster.local:11434
              OPENAI_API_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              # Web search
              ENABLE_RAG_WEB_SEARCH: "false"
              ENABLE_SEARCH_QUERY: "false"
              ENABLE_WEBSOCKET_SUPPORT: "true"
              WEBSOCKET_MANAGER: redis
              WEBSOCKET_REDIS_URL: redis://open-webui-dragonfly.ai.svc.cluster.local:6379
            envFrom:
              - secretRef:
                  name: open-webui-secret
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    persistence:
      config:
        enabled: true
        existingClaim: open-webui
        globalMounts:
          - path: /app/backend/data
    route:
      app:
        hostnames:
          - chat.nebular-grid.space
        parentRefs:
          - name: envoy-internal
            namespace: network
          - name: envoy-external
            namespace: network
    service:
      app:
        ports:
          http:
            port: 8080
