---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 30m
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.10.2
            env:
              # Features
              ENABLE_LOGIN_FORM: "true"
              ENABLE_SIGNUP: "true"
              ENABLE_OLLAMA_API: "false"
              ENABLE_OPENAI_API: "true"
              OPENAI_API_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              MEMINI_BASE_URL: http://memini.ai.svc.cluster.local:8080
              # Web search
              ENABLE_RAG_WEB_SEARCH: "true"
              ENABLE_SEARCH_QUERY: "true"
              RAG_WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: http://searxng.selfhosted.svc.cluster.local:8080/search?q=<query>
              RAG_RELEVANCE_THRESHOLD: "0.0"
              WEB_SEARCH_RESULT_COUNT: "5"
              WEB_SEARCH_CONCURRENT_REQUESTS: "10"
              ENABLE_WEBSOCKET_SUPPORT: "true"
              WEBSOCKET_MANAGER: redis
              WEBSOCKET_REDIS_URL: redis://open-webui-dragonfly.ai.svc.cluster.local:6379
            envFrom:
              - secretRef:
                  name: open-webui-secret
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
          open-terminal:
            image:
              repository: ghcr.io/open-webui/open-terminal
              tag: slim
            workingDir: /home/user
            ports:
              - containerPort: 8000
            env:
              OPEN_TERMINAL_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: OPEN_TERMINAL_API_KEY
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
              readiness:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
    persistence:
      config:
        enabled: true
        existingClaim: open-webui
        globalMounts:
          - path: /app/backend/data
    route:
      app:
        hostnames:
          - chat.nebular-grid.space
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: 8080
