---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: open-webui-secret
    creationPolicy: Owner
    template:
      data:
        # template.data replaces the secret's data; every key the app expects must be listed
        WEBUI_SECRET_KEY: "{{ .WEBUI_SECRET_KEY }}"
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        MEMINI_API_KEY: "{{ .MEMINI_API_KEY }}"
        OPEN_TERMINAL_API_KEY: "{{ .OPEN_TERMINAL_API_KEY }}"
        TERMINAL_SERVER_CONNECTIONS: |
          [{"id":"sandbox","url":"http://localhost:8000","key":"{{ .OPEN_TERMINAL_API_KEY }}","name":"Sandbox","auth_type":"bearer","config":{"access_grants":[]}}]
  data:
    - secretKey: WEBUI_SECRET_KEY
      remoteRef:
        key: open-webui
        property: secret key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: litellm
        property: master key
    - secretKey: MEMINI_API_KEY
      remoteRef:
        key: memini
        property: api key
    - secretKey: OPEN_TERMINAL_API_KEY
      remoteRef:
        key: open-webui
        property: terminal api key
