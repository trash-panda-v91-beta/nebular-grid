---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-mcp
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: github-mcp
  dependsOn:
    - name: litellm-operator
      namespace: ai
  interval: 1h
  path: ./clusters/psb/apps/ai/mcp/github-mcp/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
  wait: false
