---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: searxng-mcp
spec:
  alias: searxng_mcp
  workload:
    image: docker.io/isokoliuk/mcp-searxng:1.9.0@sha256:22e2806ad91667599138622dec4d9d3e87f07d791eca4345df24ac22025d907b
    port: 8080
    env:
      - name: SEARXNG_URL
        value: http://searxng.selfhosted.svc.cluster.local:8080
      - name: MCP_HTTP_PORT
        value: "8080"
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi
