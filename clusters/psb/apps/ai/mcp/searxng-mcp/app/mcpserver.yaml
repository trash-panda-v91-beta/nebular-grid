---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: searxng-mcp
spec:
  alias: searxng_mcp
  workload:
    image: docker.io/isokoliuk/mcp-searxng:1.10.0@sha256:de489bb2642361439549b0c30e649f5b5213f42dc33031a69a70efa9149ba5bf
    port: 8080
    env:
      - name: SEARXNG_URL
        value: http://searxng.selfhosted.svc.cluster.local:8080
      - name: MCP_HTTP_PORT
        value: "8080"
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi
