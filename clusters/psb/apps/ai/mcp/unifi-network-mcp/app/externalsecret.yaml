---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-network-mcp
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: unifi-network-mcp-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: unifi-network-mcp
        property: username
    - secretKey: password
      remoteRef:
        key: unifi-network-mcp
        property: password
    - secretKey: api_key
      remoteRef:
        key: unifi-network-mcp
        property: api_key
