---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: ha-mcp
spec:
  alias: ha_mcp
  workload:
    image: ghcr.io/homeassistant-ai/ha-mcp:7.9.0
    port: 8086
    command:
      - ha-mcp-web
    env:
      - name: HOMEASSISTANT_URL
        value: http://home-assistant-app.home-automation.svc.cluster.local:8123
      - name: HOMEASSISTANT_TOKEN
        valueFrom:
          secretKeyRef:
            name: ha-mcp-secret
            key: HOMEASSISTANT_TOKEN
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
