---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-adapter
spec:
  chartRef:
    kind: OCIRepository
    name: prometheus-adapter
  interval: 30m
  timeout: 15m
  values:
    prometheus:
      url: http://prometheus-operated.observability.svc.cluster.local
      port: 9090
    rules:
      default: false
      external:
        - seriesQuery: "{__name__=\"probe_success\",instance=\"asc.internal:2049\"}"
          resources:
            namespaced: false
          name:
            as: probe_success_nfs
          metricsQuery: max_over_time(probe_success{instance="asc.internal:2049"}[1m])
        - seriesQuery: "{__name__=\"probe_success\",instance=\"zigbee-adapter.drr.nws.internal\"}"
          resources:
            namespaced: false
          name:
            as: probe_success_zigbee
          metricsQuery: max_over_time(probe_success{instance="zigbee-adapter.drr.nws.internal"}[1m])
