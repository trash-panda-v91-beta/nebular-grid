---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mumc
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mumc-secret
    creationPolicy: Owner
    template:
      data:
        mumc_config.yaml: |
          ---
          version: 5.11.36
          basic_settings:
            filter_statements:
              episode:
                played:
                  condition_days: 14
                  count_equality: '>='
                  count: 1
          advanced_settings:
            whitetags:
              episode:
                - archive
            REMOVE_FILES: true
            behavioral_statements:
              episode:
                whitetagged:
                  action: keep
                  user_conditional: all
                  played_conditional: ignore
                  action_control: 3
                  dynamic_behavior: false
            console_controls:
            remove_empty_folders:
              episode:
                season: true
                series: false
            sonarr:
              series:
                - unmonitor: true
                  remove: false
              episode:
                - unmonitor: true
          admin_settings:
            server:
              brand: jellyfin
              url: http://jellyfin.media.svc.cluster.local:8096
              auth_key: {{ .jellyfin_api_key }}
            behavior:
              list: blacklist
              matching: byId
              users:
                monitor_disabled: false
            media_managers:
              radarr: []
              sonarr:
                - url: http://sonarr.downloads.svc.cluster.local:8989
                  api_key: {{ .sonarr_api_key }}
                  enabled: true
          DEBUG: 0
  data:
    - secretKey: jellyfin_api_key
      remoteRef:
        key: Jellyfin MUMC token
        property: password
    - secretKey: sonarr_api_key
      remoteRef:
        key: Sonarr
        property: api key