---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mumc
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mumc-secret
    creationPolicy: Owner
  data:
    - secretKey: mumc_config.yaml
      remoteRef:
        key: Jellyfin MUMC token/password
        property: password