---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-sync-favorites
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: sync
              image: ghcr.io/trash-panda-v91-beta/immich-tools:main
              args: ["sync-favorites"]
              env:
                - name: IMMICH_URL
                  value: http://immich-server.media.svc.cluster.local:2283
                - name: IMMICH_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: immich-tools-secret
                      key: api_key
                - name: FAVORITES_DIR
                  value: /favorites
              volumeMounts:
                - name: favorites
                  mountPath: /favorites
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 128Mi
          volumes:
            - name: favorites
              persistentVolumeClaim:
                claimName: immich-favorites
