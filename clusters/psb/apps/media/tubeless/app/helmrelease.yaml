---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tubeless
spec:
  chartRef:
    kind: OCIRepository
    name: tubeless
  interval: 30m
  values:
    controllers:
      tubeless:
        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: ghcr.io/communitymaintained/tubeless
              tag: 0.1.0@sha256:a8350e58a6c149012463a4e15f99ceb5b8467f0e6ae8f24ac9624d3638b96247
            env:
              TZ: Europe/Prague
              TZ_DATA_DIR: /tmp/elixir_tz_data
              PORT: &port 8945
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: tubeless
        advancedMounts:
          tubeless:
            app:
              - path: /config
      tmpfs:
        type: emptyDir
        advancedMounts:
          tubeless:
            app:
              - path: /tmp
                subPath: tmp
              - path: /etc/yt-dlp
                subPath: yt-dlp
      media:
        type: nfs
        server: asc.internal
        path: /mnt/tank/media
        advancedMounts:
          tubeless:
            app:
              - path: /downloads
    route:
      app:
        hostnames:
          - tubeless.nebular-grid.space
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
