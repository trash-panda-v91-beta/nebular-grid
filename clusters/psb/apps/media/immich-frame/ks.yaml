---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich-frame
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: immich-frame
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: immich
      namespace: media
  interval: 1h
  path: "./clusters/psb/apps/media/immich-frame/app"
  postBuild:
    substitute:
      APP: immich-frame
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
