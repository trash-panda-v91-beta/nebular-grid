---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-frame
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-frame-secret
    creationPolicy: Owner
    template:
      data:
        Settings.yml: |
          General:
            ClockFormat: 'HH:mm'
            PhotoDateFormat: 'yyyy-MM-dd'
            UnitSystem: metric
            Language: en
            Interval: 45
            TransitionDuration: 2
            ShowClock: true
            ShowProgressBar: true
            ShowPhotoDate: true
            ShowImageDesc: true
            ShowPeopleDesc: true
            ShowAlbumName: true
            ShowImageLocation: true
            ImageZoom: true
          Accounts:
            - ImmichServerUrl: 'http://immich-server.media.svc.cluster.local:2283'
              ApiKey: '{{ .api_key }}'
  data:
    - secretKey: api_key
      remoteRef:
        key: Immich Frame API Key
        property: password
