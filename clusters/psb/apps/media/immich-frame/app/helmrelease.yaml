---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-frame
spec:
  chartRef:
    kind: OCIRepository
    name: immich-frame
  interval: 1h
  values:
    controllers:
      immich-frame:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immichframe/immichframe
              tag: v1.0.33.0@sha256:1680d2f63a89fa0db6e5a7c5c497bed27a47f314efe18e1f11cff1dea1910f57
            env:
              TZ: America/Chicago
              ImmichServerUrl: http://immich-server.media.svc.cluster.local:2283
              ClockFormat: "HH:mm"
              PhotoDateFormat: "yyyy-MM-dd"
              UnitSystem: metric
            envFrom:
              - secretRef:
                  name: immich-frame-secret
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: immich-frame
        ports:
          http:
            port: &port 8080

    route:
      app:
        hostnames:
          - immich-frame.nebular-grid.space
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
