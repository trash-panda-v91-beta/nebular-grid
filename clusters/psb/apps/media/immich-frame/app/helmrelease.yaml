---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-frame
spec:
  chartRef:
    kind: OCIRepository
    name: immich-frame
  interval: 1h
  values:
    controllers:
      immich-frame:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immichframe/immichframe
              tag: v1.0.34.0@sha256:8c7b0d2d18f54f78903be78e60f09ff7542e05596c6dee96a82fd500bf169eba
            env:
              TZ: Europe/Prague
              IMMICHFRAME_CONFIG_PATH: /config
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: immich-frame
        ports:
          http:
            port: &port 8080

    persistence:
      config:
        type: secret
        name: immich-frame-secret
        globalMounts:
          - path: /config/Settings.yml
            subPath: Settings.yml
            readOnly: true

    route:
      app:
        hostnames:
          - immich-frame.nebular-grid.space
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
