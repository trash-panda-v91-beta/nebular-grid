---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: postgres-immich
  namespace: database
spec:
  name: immich
  owner: immich
  cluster:
    name: postgres
  extensions:
    - name: timescaledb
      ensure: present
    - name: vector
      ensure: present
    - name: cube
      ensure: present
    - name: earthdistance
      ensure: present
