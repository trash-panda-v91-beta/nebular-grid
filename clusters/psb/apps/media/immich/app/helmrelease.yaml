---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 30m
  values:
    controllers:
      main:
        containers:
          main:
            env:
              REDIS_HOSTNAME: immich-dragonfly.media.svc.cluster.local
              REDIS_PORT: "6379"
              REDIS_DBINDEX: "0"
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgres
                    key: url

    immich:
      metrics:
        enabled: false
      persistence:
        library:
          existingClaim: immich-library

    server:
      persistence:
        thumbs:
          existingClaim: immich-thumbs
          globalMounts:
            - path: /data/thumbs
      controllers:
        main:
          pod:
            resourceClaims:
              - name: gpu
                resourceClaimTemplateName: immich-gpu
            securityContext:
              runAsUser: 2000
              runAsGroup: 2000
              fsGroup: 2000
              fsGroupChangePolicy: OnRootMismatch
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-server
                tag: v3.0.3
              env:
                LIBVA_DRIVER_NAME: iHD
              resources:
                claims:
                  - name: gpu
                requests:
                  cpu: 50m
                  memory: 256Mi
                limits:
                  memory: 4Gi
      ingress:
        main:
          enabled: false

    machine-learning:
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-machine-learning
                tag: v3.0.3
              resources:
                requests:
                  cpu: 10m
                  memory: 512Mi
                limits:
                  memory: 4Gi
      persistence:
        cache:
          type: persistentVolumeClaim
          size: 10Gi
          accessMode: ReadWriteOnce
          storageClass: ceph-block
