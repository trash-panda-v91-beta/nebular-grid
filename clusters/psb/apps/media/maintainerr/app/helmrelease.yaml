---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: maintainerr
spec:
  chartRef:
    kind: OCIRepository
    name: maintainerr
  interval: 30m
  values:
    controllers:
      maintainerr:
        pod:
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
        containers:
          app:
            image:
              repository: ghcr.io/maintainerr/maintainerr
              tag: 3.15.1@sha256:fc23686db8c34f6383f0c4e900f1db64d5c73a8191f8554dc983e2e3fe91a7d5
            envFrom:
              - secretRef:
                  name: maintainerr-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health/liveness
                    port: 6246
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health/readiness
                    port: 6246
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        existingClaim: maintainerr
        advancedMounts:
          maintainerr:
            app:
              - path: /opt/data
                subPath: data
    route:
      app:
        hostnames:
          - maintainerr.nebular-grid.space
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: 6246
