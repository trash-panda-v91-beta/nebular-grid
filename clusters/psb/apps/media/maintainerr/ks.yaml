---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: maintainerr
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: maintainerr
  components:
    - ../../../../components/kopiur/backup
  dependsOn:
    - name: kopiur
      namespace: system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: "./clusters/psb/apps/media/maintainerr/app"
  postBuild:
    substitute:
      APP: maintainerr
      KOPIUR_CLAIM: maintainerr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
