---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      repo: github://trash-panda-v91-beta/nebular-grid
      statusChecks: true
      prComments: true
      publicUrl: https://konflate.nebular-grid.space
    secret:
      existingSecret: konflate-secret
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
