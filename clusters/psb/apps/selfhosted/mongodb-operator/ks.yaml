---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Installs the MongoDB community operator + its CRDs as a standalone flux
# kustomization so other kustomizations (habitica) can dependOn it and be
# sure the MongoDBCommunity CRD exists before they apply a CR. wait: true so
# this ks is not Ready until the operator HelmRelease is fully installed
# (CRDs applied) - otherwise dependers would race the CRD install.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mongodb-operator
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: mongodb-operator
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  interval: 1h
  path: ./clusters/psb/apps/selfhosted/mongodb-operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: true