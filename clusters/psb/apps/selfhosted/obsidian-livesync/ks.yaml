---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obsidian-livesync
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: obsidian-livesync
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: system
  interval: 1h
  path: ./clusters/psb/apps/selfhosted/obsidian-livesync/app
  postBuild:
    substitute:
      APP: obsidian-livesync
      VOLSYNC_CLAIM: obsidian-livesync-data
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
