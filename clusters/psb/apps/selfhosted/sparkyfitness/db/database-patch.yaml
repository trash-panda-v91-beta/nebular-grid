---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/database_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: postgres-sparkyfitness
  namespace: database
spec:
  name: sparkyfitness
  owner: sparkyfitness
  cluster:
    name: postgres
  extensions:
    - name: timescaledb
      ensure: present
    - name: pg_stat_statements
      ensure: present
