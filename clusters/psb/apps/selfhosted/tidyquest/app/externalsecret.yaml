---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Syncs the JWT signing secret from 1Password into a Secret the tidyquest pod
# reads via JWT_SECRET. Create a 1Password item named `tidyquest` with a
# `jwt_secret` text field (min 32 chars - `openssl rand -base64 32`).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tidyquest
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: tidyquest
    creationPolicy: Owner
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: tidyquest
        property: jwt_secret
