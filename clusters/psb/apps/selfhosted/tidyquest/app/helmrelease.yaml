---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# TidyQuest: self-hosted gamified household-chore tracker. Single container,
# SQLite (WAL) in a PVC at /app/data - no external database. First registered
# user becomes admin (registration is open by default; there is no
# invite-only env). JWT_SECRET is the only required secret.
# Repo: https://github.com/mellow-fox/TidyQuest
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tidyquest
spec:
  chartRef:
    kind: OCIRepository
    name: tidyquest
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        # ponytail: run as the image's `node` user (uid 1000) directly. The
        # image entrypoint only chowns /app/data when run as root, then drops
        # to node via su-exec. ceph-block (RBD) PVCs refuse that in-container
        # chown of the volume root (EPERM on /app/data/lost+found), so the
        # root branch crashes on boot. Running as uid 1000 skips the chown
        # branch; fsGroup 1000 makes k8s own the volume to gid 1000 at mount
        # time (kubelet has the perms the in-container chown lacks), so
        # SQLite/WAL writes succeed.
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      tidyquest:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mellowfox/tidyquest
              # ponytail: pinned to 0.6.3 (latest numerical tag on Docker Hub;
              # README badge says 0.6.0 but the image is at 0.6.3). Pin the
              # multi-arch index digest so node pulls are reproducible.
              tag: 0.6.3@sha256:508baef8ee6446315adc4cf674c5d26925fa848f5188e82c5224006edfe942f9
            env:
              NODE_ENV: production
              TZ: Europe/Prague
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: tidyquest
                    key: jwt_secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &httpPort 3000
                    path: /
                  periodSeconds: 60
                  timeoutSeconds: 10
              readiness: *probe
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 512Mi
            # ponytail: runAsUser/fsGroup live on defaultPodOptions so the
            # volume ownership is set before the container starts. Nothing
            # root-only here.
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: tidyquest
        ports:
          http:
            port: *httpPort
            protocol: HTTP
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 1Gi
        globalMounts:
          - path: /app/data
    route:
      app:
        hostnames:
          - tidyquest.nebular-grid.space
        parentRefs:
          - name: envoy-internal
            namespace: network
