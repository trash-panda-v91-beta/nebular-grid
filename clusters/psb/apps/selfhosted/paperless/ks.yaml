---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: paperless
  components:
    - ../../../../components/kopiur/backup
    - ../../../../components/zeroscaler/nas-nfs-scaler
    - ../../../../components/dragonfly
  dependsOn:
    - name: kopiur
      namespace: system
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: dragonfly-operator
      namespace: database
  interval: 1h
  path: "./clusters/psb/apps/selfhosted/paperless/app"
  postBuild:
    substitute:
      APP: paperless
      KOPIUR_MOVER_UID: "2000"
      KOPIUR_MOVER_GID: "2000"
      KOPIUR_CLAIM: paperless-data
      KOPIUR_CAPACITY: 15Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
