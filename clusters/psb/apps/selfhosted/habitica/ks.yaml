---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: habitica
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: habitica
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./clusters/psb/apps/selfhosted/habitica/app
  postBuild:
    # The bjw-s chart's `secrets.stringData` block in mongodb-helmrelease.yaml
    # uses ${mongodb_root_password} which is sourced from this Secret.
    # optional: true so the first reconcile doesn't fail when the
    # ExternalSecret hasn't synced yet.
    substituteFrom:
      - kind: Secret
        name: habitica-mongodb-substitutions
        optional: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
