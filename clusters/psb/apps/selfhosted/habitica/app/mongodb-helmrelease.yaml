---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Pattern adapted from gabe565/home-ops (kubernetes/gabernetes/apps/your-spotify
# and nightscout) which uses the official mongo entrypoint + bjw-s app-template's
# secrets/persistence/configMaps blocks. The official entrypoint:
#   - reads MONGODB_REPLSET_NAME and adds --replSet to mongod args
#   - starts a temp standalone mongod to run init scripts (creates the root
#     user from MONGO_INITDB_ROOT_USERNAME/PASSWORD_FILE)
#   - stops the temp mongod, starts the main one with --replSet
# We only need a sidecar to call rs.initiate() since the entrypoint doesn't.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: habitica-mongodb
spec:
  chartRef:
    kind: OCIRepository
    name: habitica-mongodb
  interval: 30m
  values:
    controllers:
      mongodb:
        type: statefulset
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          mongodb:
            image:
              repository: docker.io/library/mongo
              tag: "8.0.4"
            # ponytail: --replSet MUST be passed via args. MONGODB_REPLSET_NAME
            # is only used by the entrypoint to set a flag, it does NOT add
            # --replSet to mongod args. The entrypoint strips --replSet from
            # the args when running the temp standalone mongod for init
            # scripts, then re-adds it for the main mongod.
            command:
              - mongod
            args:
              - --replSet=rs0
              - --bind_ip_all
            env:
              # official entrypoint processes these:
              MONGO_INITDB_ROOT_USERNAME: root
              MONGO_INITDB_ROOT_PASSWORD_FILE: /secret/mongodb-root-password
              # habitica's blocker model uses change streams, which require a
              # replica set. The entrypoint converts this to --replSet rs0.
              MONGODB_REPLSET_NAME: rs0
              # per-app user (created by the initdb configmap script below):
              MONGO_INITDB_DATABASE: habitica
              MONGODB_EXTRA_USERNAMES: habitica
              MONGODB_EXTRA_PASSWORDS_FILE: /secret/mongodb-passwords
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /scripts/liveness.sh
                  periodSeconds: 60
                  timeoutSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /scripts/readiness.sh
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /scripts/liveness.sh
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
          # Sidecar: calls rs.initiate() once. Re-runs are idempotent.
          # mongosh is a node.js binary that needs >= 256Mi to start.
          init-replset:
            image:
              repository: docker.io/library/mongo
              tag: "8.0.4"
            env:
              - name: MONGO_ROOT_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: habitica-mongodb
                    key: mongodb-root-password
            command:
              - sh
              - -c
              - |
                set +e
                echo "waiting for mongod..."
                # ponytail: connect via the headless service DNS so the
                # member host in rs.initiate (also via headless DNS) matches.
                until mongosh --host habitica-mongodb-0.habitica-mongodb-headless --quiet -u root -p "$${MONGO_ROOT_PASSWORD}" --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })' >/dev/null 2>&1; do
                  sleep 2
                done
                echo "initialising replica set..."
                mongosh --host habitica-mongodb-0.habitica-mongodb-headless --quiet -u root -p "$${MONGO_ROOT_PASSWORD}" --authenticationDatabase admin --eval '
                  try {
                    const s = rs.status();
                    print("replica set already initialised: " + s.set);
                  } catch (e) {
                    try {
                      rs.initiate({_id: "rs0", members: [{_id: 0, host: "habitica-mongodb-0.habitica-mongodb-headless:27017"}]});
                      print("replica set initialised");
                    } catch (e2) {
                      if (e2.codeName === "AlreadyInitialized" || /already initialized/i.test(e2.message)) {
                        print("replica set already initialised (idempotent)");
                      } else {
                        throw e2;
                      }
                    }
                  }
                '
                echo "done"
                exit 0
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      mongodb:
        controller: mongodb
        ports:
          mongodb:
            port: 27017
    persistence:
      data:
        existingClaim: habitica-mongodb-data
        globalMounts:
          - path: /data/db
      secret:
        type: secret
        identifier: habitica-mongodb-auth
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /data
            subPath: data
      initdb:
        type: configMap
        identifier: initdb
        globalMounts:
          - path: /docker-entrypoint-initdb.d
      scripts:
        type: configMap
        identifier: scripts
        defaultMode: 0o550
    secrets:
      habitica-mongodb-auth:
        # Chart creates this Secret. Values come from kustomize substitution
        # (postBuild.substituteFrom on the ks.yaml reads from the
        # `habitica-mongodb-substitutions` Secret synced from 1Password).
        # The mongo entrypoint reads mongodb-root-password and
        # mongodb-passwords via _FILE env vars; the habitica pod reads
        # the `uri` key directly for NODE_DB_URI.
        stringData:
          mongodb-root-password: ${mongodb_root_password}
          mongodb-passwords: ${mongodb_root_password}
          uri: mongodb://root:${mongodb_root_password}@habitica-mongodb:27017/habitica?authSource=admin&replicaSet=rs0
    configMaps:
      initdb:
        data:
          create-user.js: |
            let {
                MONGO_INITDB_DATABASE: appDB,
                MONGODB_EXTRA_USERNAMES: user,
                MONGODB_EXTRA_PASSWORDS: pwd,
                MONGODB_EXTRA_PASSWORDS_FILE: passwordFile,
            } = process.env;

            if (!pwd && passwordFile) {
                pwd = fs.readFileSync(passwordFile, 'utf8').trim();
            }

            if (appDB && user && pwd) {
                db.createUser({ user, pwd, roles: [{ role: "readWrite", db: appDB }]});
            }
      scripts:
        data:
          liveness.sh: |
            #!/bin/sh
            exec mongosh --quiet --eval 'db.adminCommand("ping")'
          readiness.sh: |-
            #!/bin/sh
            exec mongosh --quiet --eval 'if (!(db.hello().isWritablePrimary || db.hello().secondary)) { throw new Error("Not ready") }'
