---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# The MongoDB community operator reads the user password from a Secret
# (passwordSecretRef below). This ExternalSecret syncs the password from
# 1Password into a Secret the operator can consume directly - no kustomize
# substitution, no chart-created secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: habitica-mongodb-password
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: habitica-mongodb-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: habitica
        property: mongodb_root_password