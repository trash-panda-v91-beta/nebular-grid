---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# ponytail: root user only. The bjw-s mongo deployment initialises a root
# account via MONGODB_INITDB_ROOT_USERNAME / MONGODB_INITDB_ROOT_PASSWORD and
# does not create a per-app user. For a smoke test that's fine; for production
# add a per-app user via an init container or a Job.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: habitica-mongodb-auth
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: habitica-mongodb-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # mongodb-root-password and mongodb-passwords are read by the mongo
        # entrypoint via *_FILE env vars (see mongodb-helmrelease.yaml).
        mongodb-root-password: "{{ .password }}"
        mongodb-passwords: "{{ .password }}"
        # uri is read by the habitica pod for NODE_DB_URI.
        uri: mongodb://root:{{ .password }}@habitica-mongodb:27017/habitica?authSource=admin&replicaSet=rs0
  data:
    - secretKey: password
      remoteRef:
        key: habitica
        property: mongodb_root_password
