---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# ponytail: root user only. The bjw-s mongo deployment initialises a root
# account via MONGODB_INITDB_ROOT_USERNAME / MONGODB_INITDB_ROOT_PASSWORD and
# does not create a per-app user. For a smoke test that's fine; for production
# add a per-app user via an init container or a Job.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: habitica-mongodb-auth
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: habitica-mongodb-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # ponytail: targets the bjw-s-deployed mongo (service name = HelmRelease
        # name because there is one controller and one service). No replicaSet
        # parameter; see mongodb-helmrelease.yaml for the matching standalone
        # mongod configuration.
        uri: mongodb://root:{{ .password }}@habitica-mongodb:27017/habitica?authSource=admin
  data:
    - secretKey: password
      remoteRef:
        key: habitica
        property: mongodb_root_password
