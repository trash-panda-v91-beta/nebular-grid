---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# ponytail: root user only. The bjw-s mongo deployment initialises a root
# account via MONGODB_INITDB_ROOT_USERNAME / MONGODB_INITDB_ROOT_PASSWORD and
# does not create a per-app user. For a smoke test that's fine; for production
# add a per-app user via an init container or a Job.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: habitica-mongodb-auth
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: habitica-mongodb-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # ponytail: ExternalSecret's `template` block overrides the `data` block,
        # so the secret would only have `uri` here. Both keys are needed:
        # `password` for MONGODB_INITDB_ROOT_PASSWORD on the mongo pod, `uri`
        # for NODE_DB_URI on the habitica pod.
        password: "{{ .password }}"
        uri: mongodb://root:{{ .password }}@habitica-mongodb:27017/habitica?authSource=admin
  data:
    - secretKey: password
      remoteRef:
        key: habitica
        property: mongodb_root_password
