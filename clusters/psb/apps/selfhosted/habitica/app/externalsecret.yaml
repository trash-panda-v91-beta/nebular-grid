---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# ponytail: kustomize substitution source. The bjw-s chart's `secrets` block
# can only CREATE a Secret via stringData, not reference an existing one. So
# this ExternalSecret syncs just the raw password to a substitution Secret;
# the chart then creates the actual `habitica-mongodb-auth` Secret with the
# password rendered into stringData via kustomize (see ks.yaml postBuild and
# mongodb-helmrelease.yaml). The habitica pod reads NODE_DB_URI from the
# chart-created Secret, not from this one.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: habitica-mongodb-substitutions
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: habitica-mongodb-substitutions
    creationPolicy: Owner
  data:
    - secretKey: mongodb_root_password
      remoteRef:
        key: habitica
        property: mongodb_root_password
