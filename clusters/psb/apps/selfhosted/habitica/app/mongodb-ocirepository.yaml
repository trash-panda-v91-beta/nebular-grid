---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
# ponytail: bjw-s does not ship a dedicated mongodb chart, so we deploy mongo
# via the same `app-template` chart family already in use. A second
# OCIRepository (named after the service) is the same pattern as
# `flux-operator` and `flux-instance`, which also each have their own
# OCIRepository resource pointing at their respective OCI artifacts.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: habitica-mongodb
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 5.0.1
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
