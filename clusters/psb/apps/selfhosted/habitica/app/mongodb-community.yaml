---
# mongodbcommunity.mongodb.com is installed by the community-operator
# HelmRelease above. flux retries applying this CR until the CRD exists.
# Single-node replica set: members 1 self-elects as primary. The operator
# handles rs.initiate, the mongodb-agent sidecar, and the keyFile. The
# habitica user's connection string lands in the `habitica-mongodb-uri`
# Secret (key `connectionString.standard`) which the habitica pod reads.
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: habitica-mongodb
spec:
  members: 1
  type: ReplicaSet
  version: "8.0.4"
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: habitica
      db: habitica
      passwordSecretRef:
        name: habitica-mongodb-password
      roles:
        - name: readWrite
          db: habitica
        - name: dbAdmin
          db: habitica
      scramCredentialsSecretName: habitica-scram
      connectionStringSecretName: habitica-mongodb-uri
  statefulSet:
    spec:
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: ceph-block
            resources:
              requests:
                storage: 2Gi