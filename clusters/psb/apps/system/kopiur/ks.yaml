---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: kopiur
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kopiur
      namespace: system
  interval: 1h
  path: "./clusters/psb/apps/system/kopiur/app"
  postBuild:
    substitute:
      APP: kopiur
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: system
  timeout: 5m
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-repository
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: kopiur
  dependsOn:
    - name: kopiur
  healthChecks:
    - apiVersion: kopiur.home-operations.com/v1alpha1
      kind: ClusterRepository
      name: nas
  interval: 1h
  path: "./clusters/psb/apps/system/kopiur/repository"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: system
  timeout: 5m
