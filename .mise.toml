[env]
_.fnox-env = { tools = true }
FLATE_PATH = "{{config_root}}/clusters/psb/flux/cluster"
KUBECONFIG = "{{config_root}}/kubeconfig"
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
TALOSCONFIG = "{{config_root}}/talosconfig"

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
actionlint = "1.7.12"
"github:home-operations/flate" = "0.2.12"
fnox = "1.25.1"
helm = "4.2.1"
helmfile = "1.5.3"
hk = "1.46.0"
kustomize = "5.8.1"
pkl = "0.31.1"
uv = "0.11.21"
yamlfmt = "0.21.0"
yamllint = "1.38.0"
yq = "4.53.3"
"github:mitsuhiko/minijinja[minijinja-cli]" = "2.20.0"

[settings.pipx]
uvx = true

[tasks.check]
description = "Run all checks"
run = "hk check --all"

[tasks.fix]
description = "Fix all issues"
run = "hk fix --all"

[tasks."flate:diff"]
description = "Show rendered diff of cluster changes vs main"
run = "flate diff all"
